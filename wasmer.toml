[package]
name = "kanghongcan/mcp-server"
version = "0.1.7"
description = "FastAPI MCP Search and Crawl Server"
license = "MIT"
entrypoint = "python"

[dependencies]
"python/python" = "^3.13"

[fs]
"/" = "."
"/site-packages" = "wasmer/site-packages"

[[command]]
name = "python"
module = "python/python:python"
runner = "wasi"

[command.annotations.wasi]
main-args = ["-m", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080"]
env = ["PYTHONPATH=/site-packages"]
