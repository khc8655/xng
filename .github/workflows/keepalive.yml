name: HF Space Keepalive

on:
  schedule:
    # 每天的 UTC 时间 00:00 运行一次（每 24 小时）
    - cron: '0 0 * * *'
  # 支持在 GitHub 页面上点击手动运行测试
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Send HTTP GET request to check health and prevent sleep
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://s.khc6.eu.cc/health)
          echo "HTTP Response Status Code: $STATUS_CODE"
          if [ "$STATUS_CODE" -eq 200 ] || [ "$STATUS_CODE" -eq 401 ]; then
            echo "Keepalive request successful! Status is $STATUS_CODE."
          else
            echo "Warning: Received status $STATUS_CODE"
            exit 1
          fi
